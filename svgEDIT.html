<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SVG Scratchpad</title>

<style>
  html { background-color: #222; }

  body {
    margin: 0;
    font-family: monospace;
  }

  .wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    justify-content: center;
  }

  .col {
    width: 400px;
  }

  textarea {
    width: 100%;
    height: 400px;
    background: #000;
    color: #fff;
    border: none;
    padding: 10px;
    box-sizing: border-box;
    resize: none;
    outline: none;
  }

  .preview {
    width: 400px;
    height: 400px;
    background: #fff;
  }

  .preview svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- EDITOR -->
  <div class="col">
<textarea id="editor"><svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

<!-- axes -->
<line x1="200" y1="0" x2="200" y2="400" stroke="#adf"/>
<line x1="0" y1="200" x2="400" y2="200" stroke="#adf"/>

<!-- centered + Y-up -->
<g transform="translate(200,200) scale(1,-1)">

  <!-- edit here -->
  <circle cx="0" cy="0" r="100"
          fill="none"
          stroke="red"
          stroke-width="1"/>

  <path d="M -70.7,70.7 A 100 100 0 0 0 70.7,70.7"
        style="fill:none;stroke:#f80;stroke-width:12.5"/>

  <path d="M 70.7,70.7 A 100 100 0 0 0 70.7,-70.7"
        style="fill:none;stroke:#0f8;stroke-width:12.5"/>

  <path d="M 70.7,-70.7 A 100 100 0 0 0 -70.7,-70.7"
        style="fill:none;stroke:#f08;stroke-width:12.5"/>

  <path d="M -70.7,-70.7 A 100 100 0 0 0 -70.7,70.7"
        style="fill:none;stroke:#80f;stroke-width:12.5"/>

</g>
</svg></textarea>
  </div>

  <!-- PREVIEW -->
  <div class="col">
    <div id="preview" class="preview"></div>
  </div>

</div>

<script>
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

function update() {
  preview.innerHTML = editor.value;
}

editor.addEventListener("input", update);

// initial render
update();
</script>

</body>
</html>
